<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <!-- 紫色系渐变 - 适配紫粉渐变背景 -->
    <linearGradient id="inviteGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7C3AED"/>
      <stop offset="50%" style="stop-color:#A855F7"/>
      <stop offset="100%" style="stop-color:#EC4899"/>
    </linearGradient>
    <!-- 柔和阴影 -->
    <filter id="inviteShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#7C3AED" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- h -->
  <path
    d="M50 55 L50 145 M50 100 Q50 80 70 80 L80 80 Q95 80 95 100 L95 145"
    fill="none"
    stroke="url(#inviteGradient)"
    stroke-width="8"
    stroke-linecap="round"
    stroke-linejoin="round"
    filter="url(#inviteShadow)"
  />

  <!-- g -->
  <path
    d="M125 75 Q125 50 105 50 Q85 50 85 80 L85 105 Q85 130 105 130 L115 130"
    fill="none"
    stroke="url(#inviteGradient)"
    stroke-width="8"
    stroke-linecap="round"
    filter="url(#inviteShadow)"
  />
  <path
    d="M115 130 Q120 160 95 165 Q65 170 60 135"
    fill="none"
    stroke="url(#inviteGradient)"
    stroke-width="8"
    stroke-linecap="round"
    filter="url(#inviteShadow)"
  />

  <!-- 顶部装饰弧线 -->
  <path
    d="M95 55 Q110 35 125 55"
    fill="none"
    stroke="url(#inviteGradient)"
    stroke-width="1.5"
    stroke-linecap="round"
    opacity="0.7"
  />
</svg>