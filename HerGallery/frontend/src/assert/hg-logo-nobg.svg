<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="logoGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF"/>
      <stop offset="100%" style="stop-color:#D0D0D0"/>
    </linearGradient>
    <filter id="subtleGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- h -->
  <path
    d="M50 55 L50 145 M50 100 Q50 80 70 80 L80 80 Q95 80 95 100 L95 145"
    fill="none"
    stroke="url(#logoGradient)"
    stroke-width="8"
    stroke-linecap="round"
    stroke-linejoin="round"
    filter="url(#subtleGlow)"
  />

  <!-- g -->
  <path
    d="M125 75 Q125 50 105 50 Q85 50 85 80 L85 105 Q85 130 105 130 L115 130"
    fill="none"
    stroke="url(#logoGradient)"
    stroke-width="8"
    stroke-linecap="round"
    filter="url(#subtleGlow)"
  />
  <path
    d="M115 130 Q120 160 95 165 Q65 170 60 135"
    fill="none"
    stroke="url(#logoGradient)"
    stroke-width="8"
    stroke-linecap="round"
    filter="url(#subtleGlow)"
  />

  <!-- 顶部装饰弧线 -->
  <path
    d="M95 55 Q110 35 125 55"
    fill="none"
    stroke="url(#logoGradient)"
    stroke-width="1.5"
    stroke-linecap="round"
    opacity="0.6"
  />
</svg>